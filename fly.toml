# fly.toml app configuration file generated for chers-server on 2026-03-30T17:45:03+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chers-server'
primary_region = 'ams'

[build]

[env]
PORT = '8080'
SENTRY_ENVIRONMENT = 'production'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
cpus = 1
memory_mb = 1024
